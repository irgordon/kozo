# .github/workflows/ci.yml
name: ci

on:
  pull_request:
    branches:
      - main
      - godan
  push:
    branches:
      - main
      - godan
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: full verification
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils \
            build-essential \
            curl \
            lld \
            llvm \
            mtools \
            nasm \
            python3 \
            python3-pip \
            qemu-system-x86 \
            xorriso

      - name: Acquire pinned Limine tooling
        env:
          LIMINE_VERSION: v12.3.3
          LIMINE_TARBALL_SHA256: 9e97c9fedc714daa5d7fd2b66a32d85df6bcbf3452657fd26bebad7c8b423009
        run: |
          set -euo pipefail
          limine_release="${LIMINE_VERSION#v}"
          limine_root="$RUNNER_TEMP/limine"
          limine_tarball="$RUNNER_TEMP/limine-${limine_release}.tar.xz"
          limine_url="https://github.com/Limine-Bootloader/limine/releases/download/${LIMINE_VERSION}/limine-${limine_release}.tar.xz"

          mkdir -p "$limine_root"
          curl -fsSL "$limine_url" -o "$limine_tarball"
          printf "%s  %s\n" "$LIMINE_TARBALL_SHA256" "$limine_tarball" | sha256sum -c -
          tar -xJf "$limine_tarball" -C "$limine_root" --strip-components=1
          (
            cd "$limine_root"
            ./configure \
              --enable-bios \
              --enable-bios-cd \
              --enable-uefi-x86-64 \
              --enable-uefi-cd
          )
          make -C "$limine_root"

          limine_cmd="$(find "$limine_root" -maxdepth 5 -type f -name limine -perm -111 -print -quit)"
          test -n "$limine_cmd"
          test -f "$(find "$limine_root" -maxdepth 5 -type f -name limine-bios-cd.bin -print -quit)"
          test -f "$(find "$limine_root" -maxdepth 5 -type f -name limine-bios.sys -print -quit)"
          test -f "$(find "$limine_root" -maxdepth 5 -type f -name limine-uefi-cd.bin -print -quit)"

          echo "LIMINE_DIR=$limine_root" >> "$GITHUB_ENV"
          echo "LIMINE=$limine_cmd" >> "$GITHUB_ENV"
          echo "XORRISO=$(command -v xorriso)" >> "$GITHUB_ENV"

      - name: Read pinned Rust toolchain
        id: rust-toolchain
        run: |
          channel="$(python3 - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("rust-toolchain.toml").read_text())
          print(data["toolchain"]["channel"])
          PY
          )"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.channel }}

      - name: Install Rust bare-metal target
        run: |
          rustup target add --toolchain "${{ steps.rust-toolchain.outputs.channel }}" x86_64-unknown-none
          rustup target list --installed --toolchain "${{ steps.rust-toolchain.outputs.channel }}"

      - name: Install Odin
        uses: laytan/setup-odin@v2

      - name: Show tool versions
        run: |
          python3 --version
          git --version
          rustup --version
          "$(rustup which --toolchain "${{ steps.rust-toolchain.outputs.channel }}" cargo)" --version
          "$(rustup which --toolchain "${{ steps.rust-toolchain.outputs.channel }}" rustc)" --version
          nm --version | head -n 1
          nasm -v
          qemu-system-x86_64 --version | head -n 1
          xorriso --version | head -n 1
          "$LIMINE" --version || true
          odin version

      - name: Validate shell syntax
        run: |
          bash -n scripts/verify.sh

      - name: Validate JSON documents
        run: |
          python3 -m json.tool tasks/todo.json >/dev/null
          python3 -m json.tool tasks/runtime.json >/dev/null
          python3 -m json.tool tasks/lessons.json >/dev/null
          python3 -m json.tool schemas/latest_verify.schema.json >/dev/null
          python3 -m json.tool schemas/agent_context.schema.json >/dev/null
          if [ -f contracts/kozo_abi_manifest.json ]; then
            python3 -m json.tool contracts/kozo_abi_manifest.json >/dev/null
          fi
          if [ -f schemas/kozo_abi_manifest.schema.json ]; then
            python3 -m json.tool schemas/kozo_abi_manifest.schema.json >/dev/null
          fi

      - name: Run Python unit tests
        run: |
          python3 -m unittest discover -s tests

      - name: Check Rust userspace core service
        run: |
          rustc_path="$(rustup which --toolchain "${{ steps.rust-toolchain.outputs.channel }}" rustc)"
          cargo_path="$(rustup which --toolchain "${{ steps.rust-toolchain.outputs.channel }}" cargo)"
          env RUSTC="$rustc_path" PATH="$(dirname "$rustc_path"):$PATH" "$cargo_path" check \
            --manifest-path userspace/core_service/Cargo.toml \
            --target x86_64-unknown-none

      - name: Check Odin kernel
        run: |
          odin check kernel

      - name: Build boot image
        run: |
          scripts/build_boot_image.sh
          python3 -m json.tool artifacts/runtime/boot_image/package_metadata.json >/dev/null

      - name: Run QEMU smoke evidence
        run: |
          scripts/qemu_smoke.sh
          python3 -m json.tool artifacts/runtime/qemu_smoke.metadata.json >/dev/null

      - name: Run KOZO verification harness
        run: |
          scripts/verify.sh

      - name: Validate generated verification artifact
        run: |
          python3 -m json.tool artifacts/latest_verify.json >/dev/null

      - name: Assert transient verify output was cleaned
        run: |
          test ! -e artifacts/kernel-build-check

      - name: Check for whitespace errors
        run: |
          git diff --check

      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kozo-verification-logs
          path: |
            artifacts/latest_verify.json
            artifacts/logs/*.log
            artifacts/runtime/runtime_smoke.log
            artifacts/runtime/runtime_smoke.metadata.json
            artifacts/runtime/boot_blocker_report.json
            artifacts/runtime/boot_image/package_metadata.json
            artifacts/runtime/boot_image/kozo.iso
            artifacts/runtime/qemu_smoke.log
            artifacts/runtime/qemu_smoke.metadata.json
            artifacts/runtime/qemu_smoke.summary.txt
            artifacts/runtime/qemu_smoke.stderr.log
          if-no-files-found: warn
